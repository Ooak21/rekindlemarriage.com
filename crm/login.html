<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rekindle CRM · Sign in</title>
<link rel="icon" href="../rekindle-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter+Tight:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#17120E; --ink-2:#3A302A; --ash:#6A5A4B; --paper:#FBF8F4; --surface:#FFF;
  --hearth:#FFF4E2; --rule:#EBE2D6; --ember:#C1440E; --ember-2:#A82400; --amber:#D88400;
  --display:'Fraunces',Georgia,serif; --body:'Inter Tight',system-ui,sans-serif; --mono:'IBM Plex Mono',monospace;
  --grad:linear-gradient(135deg,#F0B400,#D88400 45%,#A82400);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);color:var(--ink);background:radial-gradient(120% 120% at 50% 0%, var(--hearth), var(--paper) 55%);min-height:100svh;display:grid;place-items:center;padding:24px}
.card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--rule);border-radius:20px;box-shadow:0 1px 2px rgba(23,18,14,.05),0 18px 50px rgba(23,18,14,.12);padding:36px 30px}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.brand img{height:44px}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ember)}
h1{font-family:var(--display);font-weight:500;font-size:26px;margin:2px 0 4px}
.sub{color:var(--ash);font-size:14px;margin-bottom:22px}
label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-2);margin:0 0 6px}
input{width:100%;font-family:var(--body);font-size:15px;color:var(--ink);background:var(--surface);border:1.5px solid var(--rule);border-radius:11px;padding:12px 13px;margin-bottom:15px;transition:border-color .15s}
input:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 3px rgba(216,132,0,.12)}
button{width:100%;font-family:var(--body);font-weight:600;font-size:15.5px;color:#fff;background:var(--grad);border:0;border-radius:999px;padding:14px;cursor:pointer;box-shadow:0 8px 22px rgba(168,36,0,.28);transition:transform .12s}
button:hover{transform:translateY(-1px)}
button:disabled{opacity:.6;transform:none;cursor:default}
.err{color:var(--ember-2);font-size:13px;font-weight:500;min-height:18px;margin-top:6px}
.foot{margin-top:18px;font-size:12px;color:var(--ash);text-align:center}
</style>
</head>
<body>
  <form class="card" id="loginForm" autocomplete="on">
    <div class="brand"><img src="../rekindle-logo.png" alt="Rekindle" /></div>
    <div class="eyebrow">Rekindle CRM</div>
    <h1>Sign in</h1>
    <p class="sub">Reservations and cohort management for the Rekindle team.</p>
    <label for="email">Email</label>
    <input id="email" name="email" type="email" required autocomplete="email" />
    <label for="password">Password</label>
    <input id="password" name="password" type="password" required autocomplete="current-password" />
    <button type="submit" id="btn">Sign in</button>
    <div class="err" id="err"></div>
    <div class="foot">Rekindle · A division of Vitality Academies</div>
  </form>

<script type="module">
import { rekindleSignIn } from './auth.js';
const form = document.getElementById('loginForm');
const btn  = document.getElementById('btn');
const err  = document.getElementById('err');
if (new URLSearchParams(location.search).get('denied')) {
  err.textContent = 'That account does not have access to the Rekindle CRM.';
}
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  err.textContent = '';
  btn.disabled = true; btn.textContent = 'Signing in...';
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const res = await rekindleSignIn(email, password);
  if (res.ok) { window.location.replace('./index.html'); return; }
  err.textContent = res.error || 'Sign in failed.';
  btn.disabled = false; btn.textContent = 'Sign in';
});
</script>
</body>
</html>
